<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Galaxy Mart Foods</title>
<style>
:root{
  --bg:#1a0d05;--bg2:#1f1008;--bg3:#261408;--card:#231209;
  --border:rgba(232,160,69,0.12);--border2:rgba(232,160,69,0.22);
  --gold:#e8a045;--gold2:#f0b060;--gold3:rgba(232,160,69,0.5);
  --text:#f5e6d0;--text2:#c8a882;--text3:#7a5c3c;
  --success:#4caf82;--danger:#e05555;
  --font-head:'Georgia',serif;--font-body:'Segoe UI',system-ui,sans-serif;
  --radius:14px;--radius2:10px;--tr:0.18s ease;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body)}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#1a0d05,#261408);border-bottom:1px solid var(--border2);padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--gold)}
.brand-sub{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.table-tag{background:rgba(232,160,69,0.1);border:1px solid var(--border2);color:var(--gold);font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px}
.cat-bar{display:flex;gap:8px;padding:12px 16px 8px;overflow-x:auto;scrollbar-width:none;background:var(--bg2);border-bottom:1px solid var(--border)}
.cat-bar::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:700;padding:7px 16px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all var(--tr)}
.cat-btn.active{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;padding:16px}
@media(max-width:400px){.menu-grid{grid-template-columns:1fr 1fr;gap:10px;padding:12px}}
.food-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.food-img-wrap{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--bg3)}
.food-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.food-card:hover .food-img-wrap img{transform:scale(1.05)}
.oos-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:2}
.oos-label{background:rgba(224,85,85,0.9);color:#fff;font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.8px}
.food-info{padding:10px 10px 12px}
.food-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.food-desc{font-size:11px;color:var(--text3);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.food-footer{display:flex;align-items:center;justify-content:space-between}
.food-price{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--gold)}
.add-btn{width:30px;height:30px;border-radius:50%;background:var(--gold);border:none;color:var(--bg);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--tr),transform .15s;flex-shrink:0}
.add-btn:active{transform:scale(.88);background:var(--gold2)}
.small-add{width:26px;height:26px;font-size:15px}
.qty-ctrl{display:flex;align-items:center;gap:4px}
.qty-btn{width:26px;height:26px;border-radius:50%;background:rgba(232,160,69,0.12);border:1px solid var(--border2);color:var(--gold);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.qty-btn:active{background:var(--gold);color:var(--bg)}
.qty-num{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--gold);min-width:18px;text-align:center}
.size-controls{display:flex;flex-direction:column;gap:5px}
.size-row{display:flex;align-items:center;justify-content:space-between}
.size-lbl{font-size:11px;color:var(--text2);font-weight:600}
.size-price{color:var(--gold);font-weight:700}
.cart-fab{position:fixed;bottom:24px;right:20px;z-index:200;background:var(--gold);border:none;border-radius:28px;padding:14px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 6px 24px rgba(232,160,69,.35);transition:transform .2s,box-shadow .2s;font-family:var(--font-body)}
.cart-fab:active{transform:scale(.95)}
.cart-fab.bump{animation:bump .3s ease}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.14)}100%{transform:scale(1)}}
.cart-fab.hidden{transform:translateY(90px)!important;pointer-events:none}
.fab-icon{font-size:20px}
.fab-label{font-size:13px;font-weight:700;color:var(--bg)}
.fab-count{background:var(--bg);color:var(--gold);font-size:11px;font-weight:800;padding:2px 7px;border-radius:12px}
.fab-total{font-size:13px;font-weight:800;color:var(--bg)}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-panel{position:fixed;bottom:0;left:0;right:0;z-index:301;background:var(--bg2);border-top:1px solid var(--border2);border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1);max-height:88vh;display:flex;flex-direction:column}
.cart-panel.open{transform:translateY(0)}
.cart-drag{width:36px;height:4px;background:var(--border2);border-radius:4px;margin:12px auto 0}
.cart-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--gold)}
.cart-close{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:4px}
.cart-body{overflow-y:auto;flex:1;padding:12px 16px}
.cart-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.ci-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.ci-price{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--gold);margin:0 10px;min-width:50px;text-align:right}
.ci-rm{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:4px}
.cart-footer{padding:16px;border-top:1px solid var(--border)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.total-lbl{font-size:14px;color:var(--text2)}
.total-val{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--gold)}
.tbl-wrap label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.tbl-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:15px;padding:11px 14px;border-radius:var(--radius2);font-family:var(--font-body);outline:none;margin-bottom:12px;transition:border-color var(--tr)}
.tbl-input:focus{border-color:var(--gold3)}
.place-btn{width:100%;background:var(--gold);border:none;color:var(--bg);font-size:15px;font-weight:700;padding:15px;border-radius:var(--radius2);cursor:pointer;font-family:var(--font-body);transition:background var(--tr),transform .15s}
.place-btn:active{transform:scale(.98);background:var(--gold2)}
.place-btn:disabled{opacity:.5;pointer-events:none}
.success-screen{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;opacity:0;pointer-events:none;transform:scale(.94);transition:opacity .35s,transform .35s}
.success-screen.show{opacity:1;pointer-events:all;transform:none}
.success-icon{font-size:72px;margin-bottom:24px;animation:popIn .4s ease .1s both}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-family:var(--font-head);font-size:28px;font-weight:700;color:var(--gold);margin-bottom:10px}
.success-sub{font-size:15px;color:var(--text2);line-height:1.6;margin-bottom:32px}
.success-back{background:var(--gold);border:none;color:var(--bg);font-size:15px;font-weight:700;padding:15px 40px;border-radius:var(--radius2);cursor:pointer;font-family:var(--font-body)}
.page-loader{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s}
.page-loader.gone{opacity:0;pointer-events:none}
.loader-ring{width:44px;height:44px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-brand{font-family:var(--font-head);font-size:20px;color:var(--gold)}
.empty-msg{padding:60px 24px;text-align:center;color:var(--text3);font-size:14px}
</style>
</head>
<body>

<div class="page-loader" id="loader">
  <div class="loader-ring"></div>
  <div class="loader-brand">Galaxy Mart Foods</div>
</div>

<div class="header">
  <div>
    <div class="brand">Galaxy Mart Foods</div>
    <div class="brand-sub">Fresh · Hot · Delicious</div>
  </div>
  <div class="table-tag" id="hdr-table">Select Table</div>
</div>

<div class="cat-bar" id="cat-bar"></div>
<div class="menu-grid" id="menu-grid"></div>

<button class="cart-fab hidden" id="cart-fab" onclick="openCart()">
  <span class="fab-icon">🛒</span>
  <span class="fab-label">Order</span>
  <span class="fab-count" id="fab-count">0</span>
  <span class="fab-total" id="fab-total">₹0</span>
</button>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-drag"></div>
  <div class="cart-head">
    <span class="cart-title">Your Order</span>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-footer">
    <div class="total-row">
      <span class="total-lbl">Total</span>
      <span class="total-val" id="cart-total">₹0</span>
    </div>
    <div class="tbl-wrap">
      <label>Table Number</label>
      <input class="tbl-input" id="tbl-num" type="number" min="1" max="99" placeholder="Enter your table number">
    </div>
    <button class="place-btn" id="place-btn" onclick="placeOrder()">Place Order →</button>
  </div>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-icon">✅</div>
  <div class="success-title">Order Placed!</div>
  <div class="success-sub" id="success-sub"></div>
  <button class="success-back" onclick="closeSuccess()">Order More →</button>
</div>

var BIN_ID='69c6571cb7ec241ddcab854e';

  {id:31,name:'Paneer Kathi Roll',desc:'Spiced paneer wrapped in a grilled paratha with chutney',cat:'snacks',img:'https://i.postimg.cc/x8v3ybHZ/443e3eb28ee9315ab961787df489e30d.jpg',price:60},
  {id:32,name:'Mashroom Kathi Roll',desc:'Juicy mushroom filling in a crispy paratha roll',cat:'snacks',img:'https://i.postimg.cc/nLhSFT7k/459ba9c424fc5c54d3d8b95fd828ade2.jpg',price:60},
];

var CATS=['all','momos','noodles','pizza','burger','sandwich','snacks'];
var CAT_LBL={all:'All',momos:'Momos',noodles:'Noodles',pizza:'Pizza',burger:'Burger',sandwich:'Sandwich',snacks:'Snacks'};
var SZ_LBL={half:'Half',full:'Full',small:'Sm',large:'Lg',Half:'Half',Full:'Full',Small:'Small',Large:'Large'};
var cart={};var currentCat='all';var overrides={};var customItems=[];

function loadOv(){try{overrides=JSON.parse(localStorage.getItem('gmf_overrides')||'{}')}catch(e){}try{customItems=JSON.parse(localStorage.getItem('gmf_custom')||'[]')}catch(e){}}
function allItems(){return MENU.concat(customItems)}
function getP(item,sz){var ov=overrides[item.id]||{};if(sz)return ov['price_'+sz]!==undefined?ov['price_'+sz]:item.sizes[sz];return ov.price!==undefined?ov.price:item.price}
function ok(item){var ov=overrides[item.id]||{};return ov.inStock!==false}
function cKey(id,sz){return sz?id+'_'+sz:String(id)}

function renderCats(){
  document.getElementById('cat-bar').innerHTML=CATS.map(function(c){
    return'<button class="cat-btn'+(c===currentCat?' active':'')+'" onclick="setCat(\''+c+'\')">'+CAT_LBL[c]+'</button>';
  }).join('');
}
function setCat(c){currentCat=c;renderCats();renderMenu()}

function renderMenu(){
  loadOv();
  var grid=document.getElementById('menu-grid');
  var items=allItems().filter(function(m){return currentCat==='all'||m.cat===currentCat});
  if(!items.length){grid.innerHTML='<div class="empty-msg">No items here yet.</div>';return}
  grid.innerHTML='';
  items.forEach(function(item,i){
    var good=ok(item);
    var card=document.createElement('div');
    card.className='food-card';card.style.animationDelay=(i*.04)+'s';
    var img='<div class="food-img-wrap">'+(!good?'<div class="oos-overlay"><span class="oos-label">OUT OF STOCK</span></div>':'')+'<img src="'+item.img+'" alt="'+item.name+'" loading="lazy" onerror="this.style.opacity=0"></div>';
    if(item.sizes){
      var keys=Object.keys(item.sizes);
      var rows=keys.map(function(sz){
        var p=getP(item,sz);var qty=cart[cKey(item.id,sz)]||0;var lbl=SZ_LBL[sz]||sz;
        if(!good)return'<div class="size-row"><span class="size-lbl">'+lbl+' <span class="size-price">₹'+p+'</span></span><span style="color:var(--danger);font-size:10px">—</span></div>';
        if(qty===0)return'<div class="size-row"><span class="size-lbl">'+lbl+' <span class="size-price">₹'+p+'</span></span><button class="add-btn small-add" onclick="add('+item.id+',\''+sz+'\')">+</button></div>';
        return'<div class="size-row"><span class="size-lbl">'+lbl+' <span class="size-price">₹'+p+'</span></span><div class="qty-ctrl"><button class="qty-btn" onclick="rm('+item.id+',\''+sz+'\')">−</button><span class="qty-num">'+qty+'</span><button class="qty-btn" onclick="add('+item.id+',\''+sz+'\')">+</button></div></div>';
      }).join('');
      card.innerHTML=img+'<div class="food-info"><div class="food-name">'+item.name+'</div><div class="food-desc">'+item.desc+'</div><div class="size-controls">'+rows+'</div></div>';
    }else{
      var p=getP(item,null);var qty=cart[cKey(item.id,null)]||0;
      var ctrl=!good?'<span style="font-size:11px;color:var(--danger);font-weight:700">Unavailable</span>':qty===0?'<button class="add-btn" onclick="add('+item.id+',null)">+</button>':'<div class="qty-ctrl"><button class="qty-btn" onclick="rm('+item.id+',null)">−</button><span class="qty-num">'+qty+'</span><button class="qty-btn" onclick="add('+item.id+',null)">+</button></div>';
      card.innerHTML=img+'<div class="food-info"><div class="food-name">'+item.name+'</div><div class="food-desc">'+item.desc+'</div><div class="food-footer"><span class="food-price">₹'+p+'</span>'+ctrl+'</div></div>';
    }
    grid.appendChild(card);
  });
}

function add(id,sz){var item=allItems().find(function(m){return m.id===id});if(!item||!ok(item))return;var k=cKey(id,sz);cart[k]=(cart[k]||0)+1;syncFAB();renderMenu();var f=document.getElementById('cart-fab');f.classList.remove('bump');void f.offsetWidth;f.classList.add('bump')}
function rm(id,sz){var k=cKey(id,sz);if(cart[k]>1)cart[k]--;else delete cart[k];syncFAB();renderMenu()}
function cnt(){return Object.values(cart).reduce(function(s,v){return s+v},0)}
function tot(){return Object.entries(cart).reduce(function(s,e){var p=e[0].split('_');var id=parseInt(p[0]);var sz=p[1]||null;var item=allItems().find(function(m){return m.id===id});return item?s+getP(item,sz)*e[1]:s},0)}
function syncFAB(){var c=cnt(),t=tot(),fab=document.getElementById('cart-fab');fab.classList.toggle('hidden',c===0);document.getElementById('fab-count').textContent=c;document.getElementById('fab-total').textContent='₹'+t;var tbl=document.getElementById('tbl-num').value;document.getElementById('hdr-table').textContent=tbl?'Table '+tbl:'Select Table'}

function openCart(){document.getElementById('cart-overlay').classList.add('open');document.getElementById('cart-panel').classList.add('open');renderCartBody()}
function closeCart(){document.getElementById('cart-overlay').classList.remove('open');document.getElementById('cart-panel').classList.remove('open')}
function renderCartBody(){
  var body=document.getElementById('cart-body');
  var entries=Object.entries(cart);
  if(!entries.length){body.innerHTML='<div class="empty-msg">Nothing added yet!</div>';return}
  body.innerHTML=entries.map(function(e){
    var p=e[0].split('_');var id=parseInt(p[0]);var sz=p[1]||null;var item=allItems().find(function(m){return m.id===id});if(!item)return'';
    var price=getP(item,sz);var nm=item.name+(sz?' ('+(SZ_LBL[sz]||sz)+')':'');
    return'<div class="cart-item"><span class="ci-name">'+e[1]+'× '+nm+'</span><span class="ci-price">₹'+(price*e[1])+'</span><button class="ci-rm" onclick="rmItem(\''+e[0]+'\')">✕</button></div>';
  }).join('');
  document.getElementById('cart-total').textContent='₹'+tot();
}
function rmItem(k){delete cart[k];syncFAB();renderMenu();renderCartBody();if(!cnt())closeCart()}

var ordering=false;
async function placeOrder(){
  if(ordering)return;
  var tblEl=document.getElementById('tbl-num');var tbl=tblEl.value.trim();
  if(!tbl){tblEl.focus();tblEl.style.borderColor='var(--danger)';setTimeout(function(){tblEl.style.borderColor=''},1500);return}
  if(!cnt())return;
  ordering=true;var btn=document.getElementById('place-btn');btn.textContent='Placing…';btn.disabled=true;
  var szL={half:'Half',full:'Full',small:'Small',large:'Large'};
  var items=Object.entries(cart).map(function(e){var p=e[0].split('_');var id=parseInt(p[0]);var sz=p[1]||null;var item=allItems().find(function(m){return m.id===id});var price=getP(item,sz);return{name:item.name+(sz?' ('+(szL[sz]||sz)+')':''),qty:e[1],price:price,size:sz}});
  var total=tot();var orderNum='ORD-'+Date.now().toString(36).toUpperCase();var ts=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  var order={orderNum:orderNum,tableNumber:tbl,items:items,total:total,status:'pending',timestamp:ts,placedAt:new Date().toISOString()};
  try{
    var ex=await apiGet();ex.push(order);await apiPut(ex);
    try{await fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(order)})}catch(e){}
    cart={};syncFAB();renderMenu();closeCart();
    document.getElementById('success-sub').innerHTML='Order <strong>'+orderNum+'</strong> placed for Table <strong>'+tbl+'</strong>!<br>Total: <strong>₹'+total+'</strong><br><br>Your food is on the way 🍽️';
    document.getElementById('success-screen').classList.add('show');
  }catch(e){alert('Failed to place order. Please try again.')}
  btn.textContent='Place Order →';btn.disabled=false;ordering=false;
}
function closeSuccess(){document.getElementById('success-screen').classList.remove('show');document.getElementById('tbl-num').value='';document.getElementById('hdr-table').textContent='Select Table'}

window.addEventListener('storage',function(e){if(e.key==='gmf_overrides'||e.key==='gmf_custom'){loadOv();renderMenu()}});
renderCats();renderMenu();
setTimeout(function(){document.getElementById('loader').classList.add('gone')},500);
</script>
